<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Revisión de Canales Operativos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
  h2 { text-align:center; margin:20px 0; }

  .controls {
    margin-bottom:15px;
    text-align:center;
    background:#fff;
    padding:10px;
  }

  .contenedor-principal {
    display:flex;
    justify-content:center;
  }

  .columna {
    width:60%;
  }

  .columna h3 {
    text-align:center;
  }

  .canal-item {
    display:flex;
    align-items:center;
    border:1px solid #ccc;
    padding:5px;
    border-radius:5px;
    background:#fff;
    margin-bottom:5px;
  }

  .canal-item span { flex:1; font-weight:bold; }

  .checkbox { margin-left:10px; transform:scale(1.2); }

  select, input[type="text"] {
    margin-left:5px;
    flex:1;
    text-align:center;
    padding:3px;
  }

  button {
    margin:5px;
    padding:8px 12px;
    background:#2196F3;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
  }

  button:hover { background:#1976D2; }
</style>
</head>

<body>

<h2>Revisión de Canales Operativos</h2>

<div class="controls">
  <label>Persona Responsable:</label>
  <select id="tecnico">
    <option value="">Seleccione</option>
    <option>FRANCISCO C</option>
    <option>RONALD G</option>
    <option>WILTON M</option>
    <option>ANDY O</option>
    <option>GENESIS G</option>
    <option>FABIAN T</option>
    <option>RAFAEL G</option>
    <option>LEONARDO R</option>
  </select> 
  
  <label>Fecha:</label>
  <input type="date" id="fecha">

  <button onclick="marcarTodos()">Marcar Todos Activos</button>
  <button onclick="guardarObservaciones()">Guardar Observaciones</button>
  <button onclick="descargarReporte()">Descargar Imagen</button>
</div>

<div class="contenedor-principal">
  <div class="columna">
    <h3>CANALES ANALÓGICOS</h3>
    <div id="analogicos"></div>
  </div>
</div>

<script>

// 🔵 LISTA ANALÓGICOS COMPLETA
const canales = [
{num:2,nombre:"ECUAVISA"},
{num:3,nombre:"EL TRECE INT"},
{num:4,nombre:"RTS"},
{num:5,nombre:"TELEAMAZONAS"},
{num:6,nombre:"COSTA TV"},
{num:7,nombre:"ECUADOR TV"},
{num:8,nombre:"GAMA TV"},
{num:9,nombre:"ANTENA 3 SERIES"},
{num:10,nombre:"TC TELEVISION"},
{num:11,nombre:"TVC"},
{num:13,nombre:"OROMAR TV"},
{num:15,nombre:"TELESUR"},
{num:16,nombre:"HISPAN TV"},
{num:17,nombre:"RT RUSIAN"},
{num:18,nombre:"A&E"},
{num:20,nombre:"EL CANAL DEL FUTBOL"},
{num:21,nombre:"ESPN"},
{num:22,nombre:"FOX SPORT 3"},
{num:23,nombre:"ESPN 2"},
{num:24,nombre:"ESPN 3"},
{num:25,nombre:"ESPN 4"},
{num:26,nombre:"HISTORY"},
{num:27,nombre:"HISTORY 2"},
{num:28,nombre:"EUROCHANNEL"},
{num:29,nombre:"HBO"},
{num:30,nombre:"ZOOMOO"},
{num:31,nombre:"NICK"},
{num:32,nombre:"DREAMWORKS"},
{num:33,nombre:"NICK JR"},
{num:35,nombre:"CARTOONITO"},
{num:36,nombre:"CARTOON NETWORK"},
{num:37,nombre:"TOONCAST"},
{num:38,nombre:"SPACE"},
{num:39,nombre:"SONY"},
{num:40,nombre:"SONY MOVIES"},
{num:42,nombre:"STUDIO UNIVERSAL"},
{num:43,nombre:"UNIVERSAL"},
{num:44,nombre:"FILM & ARTS"},
{num:45,nombre:"COMEDY CENTRAL"},
{num:46,nombre:"USA"},
{num:47,nombre:"TNT SERIES"},
{num:50,nombre:"AXN"},
{num:51,nombre:"CINECANAL"},
{num:52,nombre:"AMC"},
{num:53,nombre:"HOLA TV"},
{num:54,nombre:"TNT"},
{num:55,nombre:"CINEMA PLATINO"},
{num:56,nombre:"PANICO HD"},
{num:57,nombre:"CINEMEXICANO"},
{num:66,nombre:"LIFETIME"},
{num:67,nombre:"DISCOVERY CHANNEL"},
{num:68,nombre:"E!"},
{num:70,nombre:"CANAL DE LAS ESTRELLAS"},
{num:71,nombre:"TELEMUNDO"},
{num:72,nombre:"PASIONES"},
{num:73,nombre:"TELENOVELAS"},
{num:76,nombre:"TELEFE"},
{num:77,nombre:"SEÑAL COLOMBIA"},
{num:78,nombre:"NUESTRO TIEMPO"},
{num:79,nombre:"ENLACE"},
{num:80,nombre:"EWTN"},
{num:81,nombre:"TELEVEN"}
];

const contenedor = document.getElementById('analogicos');
document.getElementById('fecha').valueAsDate = new Date();

// CREAR CANALES
canales.forEach(canal => {

  const id = `${canal.num}-ANALOGICO`;

  const div = document.createElement('div');
  div.className = 'canal-item';

  div.innerHTML = `
    <span>${canal.num} - ${canal.nombre}</span>
    <input type="checkbox" class="checkbox">

    <select class="observacion-opcion" data-id="${id}">
      <option value="">-- Seleccione --</option>
      <option>SIN VIDEO</option>
      <option>SIN AUDIO</option>
      <option>SIN AUDIO Y VIDEO</option>
      <option>SIN SEÑAL</option>
      <option>IMAGEN COLGADA</option>
      <option>CANAL BORROSO</option>
      <option>CANAL REVUELTO</option>
      <option>PROGRAMA ENCRIPTADO</option>
      <option>SE CAMBIO DE CANAL</option>
      <option>SE REALIZO BUSQUEDA CIEGA</option>
      <option>SE REINICIÓ</option>
    </select>

    <input type="text" class="observacion"
      data-id="${id}"
      data-numero="${canal.num}"
      data-canal="${canal.nombre} (ANALOGICO)"
      oninput="soloTexto(this)">
  `;

  contenedor.appendChild(div);
});

// FUNCIONES
function marcarTodos(){
  document.querySelectorAll('.checkbox').forEach(cb => cb.checked = true);
}

function soloTexto(input){
  input.value = input.value.replace(/[^A-Za-zÁÉÍÓÚÑ\s]/g,'').toUpperCase();
}

document.addEventListener("change", function(e){
  if (e.target.classList.contains("observacion-opcion")) {
    const id = e.target.dataset.id;
    const input = document.querySelector(`input.observacion[data-id="${id}"]`);
    if(input) input.value = e.target.value;
  }
});

// GUARDAR
async function guardarObservaciones(){
  const responsable = document.getElementById('tecnico').value;

  if (!responsable){
    alert("Seleccione responsable");
    return;
  }

  const observaciones = [];

  document.querySelectorAll('.observacion').forEach(input => {
    if (input.value.trim() !== ""){
      observaciones.push({
        responsable,
        numero: input.dataset.numero,
        canal: input.dataset.canal,
        observacion: input.value
      });
    }
  });

  if (observaciones.length === 0){
    observaciones.push({
      responsable,
      numero: "00",
      canal: "TODOS",
      observacion: "TODOS LOS CANALES OPERATIVOS"
    });
  }

  await fetch("https://script.google.com/macros/s/AKfycbyFC_c7It-J8K07QHFqC0mNV3ndB5H51DGaVt7is6yc7iCU3PJDmmHp8SB4duYugILf7g/exec", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(observaciones),
    mode: "no-cors"
  });

  alert("Guardado correctamente");
}

// IMAGEN
function descargarReporte(){
  html2canvas(document.body).then(canvas => {
    const link = document.createElement('a');
    link.download = "reporte.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

</script>

</body>
</html>
