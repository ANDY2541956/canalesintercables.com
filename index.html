<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Revisión de Canales Operativos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
  h2 { text-align:center; margin:20px 0; }

  .controls { margin-bottom:15px; text-align:center; background:#fff; padding:10px; }

  .contenedor-principal {
    display: flex;
    gap: 10px;
  }

  .columna {
    width: 50%;
  }

  .columna h3 {
    text-align: center;
  }

  .canal-item {
    display: flex;
    align-items: center;
    border:1px solid #ccc;
    padding:5px;
    border-radius:5px;
    background: #fff;
    margin-bottom:5px;
  }

  .canal-item span { flex:1; font-weight:bold; }

  .checkbox { margin-left:10px; transform: scale(1.2); cursor:pointer; }

  select, input[type="text"] {
    margin-left:5px;
    flex:1;
    text-align:center;
    padding:3px;
  }

  button {
    margin:5px; padding:8px 12px; background:#2196F3; color:white;
    border:none; border-radius:5px; cursor:pointer;
  }

  button:hover { background:#1976D2; }
</style>
</head>

<body>

<h2>Revisión de Canales Operativos</h2>

<div class="controls">
  <label>Persona Responsable:</label>
  <select id="tecnico">
    <option value="">Seleccione</option>
    <option>FRANCISCO C</option>
    <option>RONALD G</option>
    <option>WILTON M</option>
    <option>ANDY O</option>
    <option>GENESIS G</option>
    <option>FABIAN T</option>
    <option>RAFAEL G</option>
    <option>LEONARDO R</option>
  </select> 
  
  <label>Fecha:</label>
  <input type="date" id="fecha">

  <button onclick="marcarTodos()">Marcar Todos Activos</button>
  <button onclick="guardarObservaciones()">Guardar Observaciones</button>
  <button onclick="descargarReporte()">Descargar Imagen</button>
</div>

<div class="contenedor-principal">
  
  <div class="columna">
    <h3>CANALES ANALÓGICOS</h3>
    <div id="analogicos"></div>
  </div>

  <div class="columna">
    <h3>CANALES DIGITALES</h3>
    <div id="digitales"></div>
  </div>

</div>

<script>

// ANALÓGICOS
const canales = [
"ECUAVISA","EL TRECE","RTS","TELEAMAZONAS","COSTA TV","ECUADOR TV","GAMA TV","ANTENA 3 SERIES","TC TELEVISION","TVC","AZTECA UNO","OROMAR","44.2","TELESUR","HISPAN TV","ANTV","A&E","VTV","ESPN HD","ESPN 2","FOX SPORTS 3","ESPN 3","ESPN 4","ESPN 5","HISTORY","HISTORY 2","EUROCHANNEL","HBO FAMILY","ZOOMOO","NICKELODEON","DREAMWORKS","NICK JR","CANAL 9","CARTOONITO","CARTOON NETWORK","TOONCAST","TNT SPORTS","SONY","SONY MOVIES","A3 CINEMA","STUDIO UNIVERSAL","UNIVERSAL","FILM & ARTS","COMEDY CENTRAL","USA","TNT SERIES","EUROPA HD","VENEVISION","AXN","CINECANAL","AMC","HOLA TV","TNT","CINEMA PLATINO","PANICO TV","CINE MEXICANO","TRAVEL XP","AMC SERIES","MTV","TV PUBLICA ARG","CARACOL","Q MUSICA","VIDEO ROLA","GOURMET","LIFETIME","DISCOVERY CHANNEL","E!","RCN SD","CANAL DE LAS ESTRELLAS","TELEMUNDO","PASIONES","TELENOVELAS","VENE PLUS","CITY TV","TELEFE","SENAL COLOMBIA","NUESTRO TIEMPO","ENLACE","EWTN","TELEVEN"
];

// DIGITALES (57)
const canalesDigitales = [
"ECUAVISA","EL TRECE","RTS","TELEAMAZONAS","COSTA TV","ECUADOR TV","GAMA TV",
"TC TELEVISION","TVC","OROMAR TV","KANAL D DRAMA","TELESUR","HISPAN TV",
"RT RUSIAN TV","A&E","TyC SPORTS","ECDF","FOX SPORTS 2","FOX SPORTS 3",
"ESPN","ESPN 2","ESPN 3","HISTORY","HISTORY 2","HBO","NAT GEO","ZOOMOO",
"NICK","DREAMWORKS","NICK JR","CARTOONITO","CARTOON NETWORK","TOONCAST",
"SPACE","SONY CHANNEL","SONY MOVIES","STUDIO UNIVERSAL","UNIVERSAL",
"COMEDY CENTRAL","USA","TNT SERIES","AXN","CINECANAL","AMC","HOLA TV",
"TNT","CINEMA PLATINO","PANICO HD","CINE MEXICANO","LIFETIME",
"DISCOVERY CHANNEL","E! ENTERTAIMENT","LAS ESTRELLAS","TELEMUNDO",
"PASIONES","TELENOVELAS","TELEFE"
];

const analogicosDiv = document.getElementById('analogicos');
const digitalesDiv = document.getElementById('digitales');

document.getElementById('fecha').valueAsDate = new Date();

// ANALÓGICOS NORMAL
function crearCanales(lista, tipo, contenedor, inicio){
  lista.forEach((nombre, index) => {
    const numero = inicio + index;
    const idUnico = `${numero}-${tipo}`;

    const div = document.createElement('div');
    div.className = 'canal-item';

    div.innerHTML = `
      <span>${numero} - ${nombre}</span>
      <input type="checkbox" class="checkbox">
      <select class="observacion-opcion" data-id="${idUnico}">
        <option value="">-- Seleccione --</option>
        <option value="SIN VIDEO">SIN VIDEO</option>
        <option value="SIN AUDIO">SIN AUDIO</option>
        <option value="SIN AUDIO Y VIDEO">SIN AUDIO Y VIDEO</option>
        <option value="SIN SEÑAL">SIN SEÑAL</option>
      </select>
      <input type="text" class="observacion" data-id="${idUnico}" data-numero="${numero}" data-canal="${nombre} (${tipo})">
    `;

    contenedor.appendChild(div);
  });
}

// 🔥 DIGITALES CON 31.1, 31.2...
function crearDigitales(lista, contenedor){
  let canalBase = 31;
  let sub = 1;

  lista.forEach((nombre) => {

    const numero = `${canalBase}.${sub}`;
    const idUnico = `${numero}-DIGITAL`;

    const div = document.createElement('div');
    div.className = 'canal-item';

    div.innerHTML = `
      <span>${numero} - ${nombre}</span>
      <input type="checkbox" class="checkbox">
      <select class="observacion-opcion" data-id="${idUnico}">
        <option value="">-- Seleccione --</option>
        <option value="SIN VIDEO">SIN VIDEO</option>
        <option value="SIN AUDIO">SIN AUDIO</option>
        <option value="SIN AUDIO Y VIDEO">SIN AUDIO Y VIDEO</option>
        <option value="SIN SEÑAL">SIN SEÑAL</option>
      </select>
      <input type="text" class="observacion" data-id="${idUnico}" data-numero="${numero}" data-canal="${nombre} (DIGITAL)">
    `;

    contenedor.appendChild(div);

    sub++;
    if(sub > 4){
      sub = 1;
      canalBase++;
    }
  });
}

// CREAR
crearCanales(canales, "ANALOGICO", analogicosDiv, 2);
crearDigitales(canalesDigitales, digitalesDiv);

</script>

</body>
</html>
