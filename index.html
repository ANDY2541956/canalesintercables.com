<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Revisión de Canales Operativos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
  h2 { text-align:center; margin:20px 0; }

  .controls { margin-bottom:15px; text-align:center; background:#fff; padding:10px; }

  .contenedor-principal {
    display: flex;
    justify-content: center;
  }

  .columna {
    width: 80%;
  }

  .columna h3 {
    text-align: center;
  }

  /* 🔥 AQUÍ ESTÁ EL CAMBIO IMPORTANTE */
  #analogicos {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .canal-item {
    display: flex;
    align-items: center;
    border:1px solid #ccc;
    padding:5px;
    border-radius:5px;
    background: #fff;
  }

  .canal-item span { flex:1; font-weight:bold; }

  .checkbox { margin-left:10px; transform: scale(1.2); cursor:pointer; }

  select, input[type="text"] {
    margin-left:5px;
    flex:1;
    text-align:center;
    padding:3px;
  }

  button {
    margin:5px; padding:8px 12px; background:#2196F3; color:white;
    border:none; border-radius:5px; cursor:pointer;
  }

  button:hover { background:#1976D2; }
</style>
</head>

<body>

<h2>Revisión de Canales Operativos</h2>

<div class="controls">
  <label>Persona Responsable:</label>
  <select id="tecnico">
    <option value="">Seleccione</option>
    <option>FRANCISCO C</option>
    <option>RONALD G</option>
    <option>WILTON M</option>
    <option>ANDY O</option>
    <option>GENESIS G</option>
    <option>FABIAN T</option>
    <option>RAFAEL G</option>
    <option>LEONARDO R</option>
  </select> 
  
  <label>Fecha:</label>
  <input type="date" id="fecha">

  <button onclick="marcarTodos()">Marcar Todos Activos</button>
  <button onclick="guardarObservaciones()">Guardar Observaciones</button>
  <button onclick="descargarReporte()">Descargar Imagen</button>
</div>

<div class="contenedor-principal">
  <div class="columna">
    <h3>CANALES ANALÓGICOS</h3>
    <div id="analogicos"></div>
  </div>
</div>

<script>

// LISTA BASE
const canales = [
"ECUAVISA","EL TRECE","RTS","TELEAMAZONAS","COSTA TV","ECUADOR TV","GAMA TV","ANTENA 3 SERIES","TC TELEVISION","TVC","AZTECA UNO","OROMAR","44.2","TELESUR","HISPAN TV","ANTV","A&E","VTV","ESPN HD","ESPN 2","FOX SPORTS 3","ESPN 3","ESPN 4","ESPN 5","HISTORY","HISTORY 2","EUROCHANNEL","HBO FAMILY","ZOOMOO","NICKELODEON","DREAMWORKS","NICK JR","CANAL 9","CARTOONITO","CARTOON NETWORK","TOONCAST","TNT SPORTS","SONY","SONY MOVIES","A3 CINEMA","STUDIO UNIVERSAL","UNIVERSAL","FILM & ARTS","COMEDY CENTRAL","USA","TNT SERIES","EUROPA HD","VENEVISION","AXN","CINECANAL","AMC","HOLA TV","TNT","CINEMA PLATINO","PANICO TV","CINE MEXICANO","TRAVEL XP","AMC SERIES","MTV","TV PUBLICA ARG","CARACOL","Q MUSICA","VIDEO ROLA","GOURMET","LIFETIME","DISCOVERY CHANNEL","E!","RCN SD","CANAL DE LAS ESTRELLAS","TELEMUNDO","PASIONES","TELENOVELAS","VENE PLUS","CITY TV","TELEFE","SENAL COLOMBIA","NUESTRO TIEMPO","ENLACE","EWTN","TELEVEN"
];

// CONTENEDOR
const analogicosDiv = document.getElementById('analogicos');

// FECHA
document.getElementById('fecha').valueAsDate = new Date();

// CREAR CANALES
function crearCanales(lista, tipo, contenedor, inicio){
  lista.forEach((nombre, index) => {

    const numero = inicio + index;

    const div = document.createElement('div');
    div.className = 'canal-item';

    div.innerHTML = `
      <span>${numero.toString().padStart(2,'0')} - ${nombre}</span>
      <input type="checkbox" class="checkbox">

      <select class="observacion-opcion" data-numero="${numero}">
        <option value="">-- Seleccione --</option>
        <option value="SIN VIDEO">SIN VIDEO</option>
        <option value="SIN AUDIO">SIN AUDIO</option>
        <option value="SIN AUDIO Y VIDEO">SIN AUDIO Y VIDEO</option>
        <option value="SIN SEÑAL">SIN SEÑAL</option>
        <option value="IMAGEN COLGADA">IMAGEN COLGADA</option>
        <option value="CANAL BORROSO">CANAL BORROSO</option>
        <option value="CANAL REVUELTO">CANAL REVUELTO</option>
        <option value="PROGRAMA ENCRIPTADO">PROGRAMA ENCRIPTADO</option>
        <option value="SE CAMBIO DE CANAL">SE CAMBIO DE CANAL</option>
        <option value="SE REALIZO BUSQUEDA CIEGA">SE REALIZO BUSQUEDA CIEGA</option>
        <option value="SE REINICIÓ">SE REINICIÓ</option>
      </select>

      <input type="text" class="observacion"
        data-numero="${numero}" data-canal="${nombre} (${tipo})"
        oninput="soloTexto(this)">
    `;

    contenedor.appendChild(div);
  });
}

// GENERAR
crearCanales(canales, "ANALOGICO", analogicosDiv, 2);

// FUNCIONES
function marcarTodos(){
  document.querySelectorAll('.checkbox').forEach(cb => cb.checked = true);
}

function soloTexto(input){
  input.value = input.value.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ\s]/g,'').toUpperCase();
}

document.addEventListener("change", function(e){
  if (e.target.classList.contains("observacion-opcion")) {
    const numero = e.target.dataset.numero;
    const input = document.querySelector(`input.observacion[data-numero="${numero}"]`);
    if(input) input.value = e.target.value;
  }
});

// GUARDAR
async function guardarObservaciones(){
  const responsable = document.getElementById('tecnico').value;

  if (!responsable){
    alert("Seleccione responsable");
    return;
  }

  const observaciones = [];

  document.querySelectorAll('.observacion').forEach(input => {
    if (input.value.trim() !== ""){
      observaciones.push({
        responsable,
        numero: input.dataset.numero,
        canal: input.dataset.canal,
        observacion: input.value
      });
    }
  });

  if (observaciones.length === 0){
    observaciones.push({
      responsable,
      numero: "00",
      canal: "TODOS",
      observacion: "TODOS LOS CANALES OPERATIVOS"
    });
  }

  await fetch("https://script.google.com/macros/s/AKfycbzyOB9mnlBVjGJRqJ29e2WkPIlMN6BIDLtAD5I7jNXClpzEquBk7a2g-kEZRBqo17dtkA/exec", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(observaciones),
    mode: "no-cors"
  });

  alert("Guardado correctamente");
}

// IMAGEN
function descargarReporte(){
  html2canvas(document.body).then(canvas => {
    const link = document.createElement('a');
    link.download = "reporte.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

</script>

</body>
</html>
